version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: debate_analyzer_db
    environment:
      POSTGRES_USER: debate_user
      POSTGRES_PASSWORD: debate_pass
      POSTGRES_DB: debate_analyzer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U debate_user -d debate_analyzer"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: debate_analyzer_cache
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  redisdata:
