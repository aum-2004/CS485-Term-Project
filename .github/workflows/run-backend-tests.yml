name: Backend Tests

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/run-backend-tests.yml'
  pull_request:
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://debate_user:debate_pass@localhost:5432/debate_analyzer
      ANTHROPIC_API_KEY: placeholder-not-needed-tests-mock-ai
      REDIS_URL: redis://localhost:6379

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: debate_user
          POSTGRES_PASSWORD: debate_pass
          POSTGRES_DB: debate_analyzer
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run tests
        working-directory: backend
        run: npm test
