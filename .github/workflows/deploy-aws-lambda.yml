name: Deploy Backend to AWS Lambda

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-aws-lambda.yml'

jobs:
  deploy-lambda:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies (production only)
        working-directory: backend
        run: npm ci --omit=dev

      - name: Install dev dependencies for TypeScript compile
        working-directory: backend
        run: npm ci

      - name: Compile TypeScript
        working-directory: backend
        run: npx tsc

      - name: Package Lambda deployment ZIP
        working-directory: backend
        run: |
          # Bundle compiled JS + production node_modules into lambda.zip
          cd dist
          zip -r ../lambda.zip .
          cd ..
          zip -r lambda.zip node_modules

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy ZIP to Lambda
        working-directory: backend
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://lambda.zip

      - name: Wait for Lambda update to complete
        run: |
          aws lambda wait function-updated \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }}

      - name: Verify Lambda deployment
        run: |
          aws lambda get-function \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --query 'Configuration.LastModified'
