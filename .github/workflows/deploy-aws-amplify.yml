name: Deploy Frontend to AWS Amplify

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-aws-amplify.yml'

jobs:
  deploy-amplify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Trigger Amplify redeploy
        run: |
          aws amplify start-job \
            --app-id ${{ secrets.AMPLIFY_APP_ID }} \
            --branch-name main \
            --job-type RELEASE

      - name: Wait for Amplify deployment to finish
        run: |
          # Poll until the job status is SUCCEED or FAILED (max ~10 minutes)
          APP_ID=${{ secrets.AMPLIFY_APP_ID }}
          BRANCH=main
          for i in $(seq 1 30); do
            STATUS=$(aws amplify list-jobs \
              --app-id "$APP_ID" \
              --branch-name "$BRANCH" \
              --max-results 1 \
              --query 'jobSummaries[0].status' \
              --output text)
            echo "Amplify job status: $STATUS"
            if [ "$STATUS" = "SUCCEED" ]; then
              echo "Deployment succeeded."
              exit 0
            elif [ "$STATUS" = "FAILED" ]; then
              echo "Deployment failed!"
              exit 1
            fi
            sleep 20
          done
          echo "Timed out waiting for Amplify deployment."
          exit 1
